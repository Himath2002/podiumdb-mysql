<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="480" viewBox="0 0 1440 480" role="img" aria-labelledby="title description">
  <title id="title">PodiumDB project overview</title>
  <description id="description">A normalized MySQL sports analytics system with ten tables, five analytical views, and verified integrity rules.</description>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071b2a"/>
      <stop offset="1" stop-color="#0e3a45"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#35d4a4"/>
      <stop offset="1" stop-color="#a6ef71"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#001018" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1440" height="480" rx="30" fill="url(#background)"/>
  <circle cx="1322" cy="-34" r="204" fill="#35d4a4" opacity="0.07"/>
  <circle cx="1225" cy="428" r="168" fill="#a6ef71" opacity="0.05"/>

  <g transform="translate(88 88)">
    <rect width="118" height="118" rx="28" fill="#102f39" stroke="#35d4a4" stroke-width="2"/>
    <g transform="translate(25 24)" fill="none" stroke="url(#accent)" stroke-width="6">
      <ellipse cx="34" cy="13" rx="31" ry="11"/>
      <path d="M3 13v20c0 6 14 11 31 11s31-5 31-11V13"/>
      <path d="M3 33v20c0 6 14 11 31 11s31-5 31-11V33"/>
      <path d="M3 53v7c0 6 14 11 31 11s31-5 31-11v-7"/>
    </g>
  </g>

  <text x="240" y="134" fill="#8ee5c4" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="3">MYSQL SPORTS ANALYTICS</text>
  <text x="240" y="207" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="64" font-weight="750">PodiumDB</text>
  <text x="240" y="252" fill="#bed0d4" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="24">Integrity-first competition data, from entry to insight.</text>

  <g filter="url(#shadow)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <g transform="translate(88 326)">
      <rect width="244" height="92" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="43" fill="#ffffff" font-size="30" font-weight="750">10 tables</text>
      <text x="24" y="68" fill="#a9bec3" font-size="15">normalized relational core</text>
    </g>
    <g transform="translate(350 326)">
      <rect width="244" height="92" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="43" fill="#ffffff" font-size="30" font-weight="750">5 views</text>
      <text x="24" y="68" fill="#a9bec3" font-size="15">analysis-ready projections</text>
    </g>
    <g transform="translate(612 326)">
      <rect width="244" height="92" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="24" y="43" fill="#ffffff" font-size="30" font-weight="750">17 tests</text>
      <text x="24" y="68" fill="#a9bec3" font-size="15">Python and SQL contracts</text>
    </g>
    <g transform="translate(874 326)">
      <rect width="478" height="92" rx="18" fill="url(#accent)"/>
      <text x="28" y="42" fill="#082a31" font-size="24" font-weight="800">MySQL 8.4 · Python 3.10+</text>
      <text x="28" y="68" fill="#14464a" font-size="15">Docker Compose · deterministic synthetic data</text>
    </g>
  </g>
</svg>
