<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title description">
  <title id="title">PodiumDB system architecture</title>
  <description id="description">SQL and Python entry points connect to a layered MySQL database that produces analytics and an audit trail.</description>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#168c7d"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#18353a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1440" height="760" rx="30" fill="#f2f7f5"/>
  <text x="72" y="70" fill="#123f3b" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="750">A database boundary that owns its invariants</text>
  <text x="72" y="105" fill="#56706f" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">Two entry points, one integrity layer, reusable read models.</text>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="72" y="168" fill="#168c7d" font-size="14" font-weight="800" letter-spacing="2">ENTRY POINTS</text>
    <g filter="url(#shadow)">
      <rect x="72" y="198" width="278" height="136" rx="20" fill="#ffffff" stroke="#cadad6"/>
      <circle cx="112" cy="238" r="18" fill="#d7f5e9"/>
      <path d="M104 237h16M104 245h12M106 229l-5 8 5 8" fill="none" stroke="#168c7d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="144" y="239" fill="#173a37" font-size="22" font-weight="750">SQL workspace</text>
      <text x="96" y="282" fill="#56706f" font-size="15">Bootstrap · queries · invariants</text>
      <text x="96" y="307" fill="#56706f" font-size="15">Docker Compose or MySQL client</text>

      <rect x="72" y="402" width="278" height="136" rx="20" fill="#ffffff" stroke="#cadad6"/>
      <circle cx="112" cy="442" r="18" fill="#d7f5e9"/>
      <path d="M102 434h20v16h-20zM107 430v4M117 430v4M107 450v4M117 450v4" fill="none" stroke="#168c7d" stroke-width="2.5" stroke-linecap="round"/>
      <text x="144" y="443" fill="#173a37" font-size="22" font-weight="750">Python client</text>
      <text x="96" y="486" fill="#56706f" font-size="15">Environment-backed configuration</text>
      <text x="96" y="511" fill="#56706f" font-size="15">Parameterized repository methods</text>
    </g>

    <line x1="350" y1="266" x2="430" y2="266" stroke="#168c7d" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="350" y1="470" x2="430" y2="470" stroke="#168c7d" stroke-width="3" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="446" y="154" width="548" height="474" rx="26" fill="#0d3838"/>
      <text x="482" y="200" fill="#9ce6c8" font-size="14" font-weight="800" letter-spacing="2">MYSQL 8.4</text>
      <text x="482" y="239" fill="#ffffff" font-size="30" font-weight="750">PodiumDB</text>

      <rect x="482" y="270" width="476" height="88" rx="16" fill="#174a47"/>
      <text x="506" y="305" fill="#ffffff" font-size="20" font-weight="700">Analytics</text>
      <text x="506" y="333" fill="#afd0cb" font-size="15">5 views · 10 documented queries</text>

      <rect x="482" y="378" width="476" height="98" rx="16" fill="#1a5852"/>
      <text x="506" y="415" fill="#ffffff" font-size="20" font-weight="700">Integrity</text>
      <text x="506" y="443" fill="#bde0d8" font-size="15">Checks · foreign keys · procedures · triggers</text>

      <rect x="482" y="496" width="476" height="96" rx="16" fill="#d8f3e8"/>
      <text x="506" y="533" fill="#123f3b" font-size="20" font-weight="750">Relational core</text>
      <text x="506" y="561" fill="#3f625f" font-size="15">10 normalized tables · InnoDB · utf8mb4</text>
    </g>

    <line x1="994" y1="266" x2="1074" y2="266" stroke="#168c7d" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="994" y1="470" x2="1074" y2="470" stroke="#168c7d" stroke-width="3" marker-end="url(#arrow)"/>

    <text x="1090" y="168" fill="#168c7d" font-size="14" font-weight="800" letter-spacing="2">OUTCOMES</text>
    <g filter="url(#shadow)">
      <rect x="1090" y="198" width="278" height="136" rx="20" fill="#ffffff" stroke="#cadad6"/>
      <circle cx="1130" cy="238" r="18" fill="#e8f8d6"/>
      <path d="M1121 247v-9M1130 247v-17M1139 247v-25" fill="none" stroke="#507c21" stroke-width="3" stroke-linecap="round"/>
      <text x="1162" y="239" fill="#173a37" font-size="22" font-weight="750">Read models</text>
      <text x="1114" y="282" fill="#56706f" font-size="15">Medals · rosters · participation</text>
      <text x="1114" y="307" fill="#56706f" font-size="15">Schedules · delegation analysis</text>

      <rect x="1090" y="402" width="278" height="136" rx="20" fill="#ffffff" stroke="#cadad6"/>
      <circle cx="1130" cy="442" r="18" fill="#ffe5d8"/>
      <path d="M1124 432h12l5 5v15h-22v-20zM1136 432v6h5M1124 443h12M1124 448h9" fill="none" stroke="#c85e39" stroke-width="2" stroke-linejoin="round"/>
      <text x="1162" y="443" fill="#173a37" font-size="22" font-weight="750">Audit trail</text>
      <text x="1114" y="486" fill="#56706f" font-size="15">Before-and-after JSON snapshots</text>
      <text x="1114" y="511" fill="#56706f" font-size="15">Actor and timestamp captured</text>
    </g>

    <rect x="72" y="666" width="1296" height="44" rx="22" fill="#d7f5e9"/>
    <text x="720" y="694" text-anchor="middle" fill="#145d55" font-size="15" font-weight="700">Every write path is validated inside the database · every credential stays outside source code</text>
  </g>
</svg>
